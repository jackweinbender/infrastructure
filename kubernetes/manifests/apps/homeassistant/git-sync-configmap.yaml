apiVersion: v1
kind: ConfigMap
metadata:
  name: git-sync-script
  namespace: homeassistant
data:
  git-sync.sh: |
    #!/bin/sh
    set -e

    # Configuration
    REPO_URL="git@github.com:jackweinbender/ha-config.git"
    TARGET_DIR="/config"
    SSH_KEY_SRC="/etc/git-secret/id_ed25519"
    # Use home dir for persistent identity file owned by user
    SSH_DIR="/home/homeassistant/.ssh"
    IDENTITY_FILE="$SSH_DIR/identity"

    echo "Starting git-sync..."

    # Ensure config dir exists
    mkdir -p "$TARGET_DIR"

    if [ ! -f "$SSH_KEY_SRC" ]; then
      echo "ERROR: Secret key not found at $SSH_KEY_SRC"
      exit 1
    fi

    # Configure SSH for git
    mkdir -p "$SSH_DIR"
    cp "$SSH_KEY_SRC" "$IDENTITY_FILE"
    chmod 600 "$IDENTITY_FILE"

    # Disable strict host checking for automation
    echo "StrictHostKeyChecking no" > "$SSH_DIR/config"

    # Configure git to use the key
    export GIT_SSH_COMMAND="ssh -i $IDENTITY_FILE -o UserKnownHostsFile=/dev/null -o StrictHostKeyChecking=no"

    cd "$TARGET_DIR"

    git config --global --add safe.directory /config

    MAX_RETRIES=3
    ATTEMPT=0
    until [ $ATTEMPT -ge $MAX_RETRIES ]; do
      ATTEMPT=$((ATTEMPT+1))
      echo "Git sync attempt $ATTEMPT/$MAX_RETRIES..."

      if [ -d ".git" ]; then
        echo "Repo exists, pulling changes..."
        git fetch origin && git checkout origin/main -- . && break
      elif [ "$(ls -A .)" ]; then
        echo "Config exists but not a git repo. Initializing..."
        git init && git remote add origin "$REPO_URL" && git fetch origin && git checkout origin/main -- . && break
      else
        echo "Directory empty, cloning..."
        git clone "$REPO_URL" . && break
      fi

      echo "Attempt $ATTEMPT failed. Retrying in $((ATTEMPT * 5))s..."
      sleep $((ATTEMPT * 5))
    done

    if [ $ATTEMPT -ge $MAX_RETRIES ] && [ ! -d ".git" ]; then
      echo "ERROR: git sync failed after $MAX_RETRIES attempts."
      exit 1
    fi

    # Fix ownership so the main container (uid 101000 / gid 110000) can read/write
    chown -R 101000:110000 "$TARGET_DIR"
    chown -R 101000:110000 "$SSH_DIR"

    echo "Sync complete."
